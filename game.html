      .back-to-landing {
        position: fixed;
        z-index: 3000;
        top: auto;
        bottom: max(12px, env(safe-area-inset-bottom));
        left: max(12px, env(safe-area-inset-left));
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 0 10px;
        border: 2px solid rgba(255, 178, 46, 0.78);
        border-radius: 6px;
        background: rgba(16, 19, 26, 0.86);
        color: #ffffff;
        font: 700 11px "Lexend Deca", "Segoe UI", Arial, sans-serif;
        text-decoration: none;
        letter-spacing: 0;
        opacity: 0.5;
      }
      .back-to-landing:focus-visible,
      .back-to-landing:hover {
        background: #ffb22e;
        color: #10131a;
        outline: none;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <a class="back-to-landing" href="./" aria-label="Powrót do strony startowej">Powrót</a>

    <script src="runtime-config.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
